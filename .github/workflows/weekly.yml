name: Weekly ROI Cohort Report

on:
  schedule:
    # Wednesday 06:00 UTC — matches Wed–Tue cohort week
    - cron: '0 6 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r roomvu-weekly-report/requirements.txt

      - name: Build deck
        working-directory: roomvu-weekly-report
        env:
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          SUPERMETRICS_API_KEY: ${{ secrets.SUPERMETRICS_API_KEY }}
          GOOGLE_ADS_ACCOUNT_ID: "4594075026"
          LINKEDIN_ADS_ACCOUNT_ID: "508540143"
        run: python build.py

      - name: Commit index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: weekly ROI cohort report $(date -u +%Y-%m-%d)"
          git push

      # index.html is committed to main root above — Pages serves it directly.
      # No deploy-pages action needed when source = "Deploy from branch / main / (root)".
