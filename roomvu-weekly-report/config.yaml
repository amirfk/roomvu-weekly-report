# ai_analysis is a FUTURE slide property — not implemented in v1.
metabase_url_env: METABASE_URL
metabase_api_key_env: METABASE_API_KEY
supermetrics_api_key_env: SUPERMETRICS_API_KEY
google_ads_account_id: "4594075026"
linkedin_ads_account_id: "508540143"

deck:
  title: "Roomvu — Weekly ROI Cohort Report"
  shade_scale: [0, 150]        # % clamp range for cell color
  break_even: 100              # % anchor for red/green split

slides:
  - id: insurance_roi
    metabase_question: 8268
    title: "Meta · Insurance Agents — ROI Cohort (Weekly)"
    render: cohort_table
    platform: meta
  - id: financial_planners_roi
    metabase_question: 8271
    title: "Meta · Financial Planners — ROI Cohort (Weekly)"
    render: cohort_table
    platform: meta
  - id: realtors_roi
    metabase_question: 8279
    title: "Meta · Realtors — ROI Cohort (Weekly)"
    render: cohort_table
    platform: meta
  - id: mortgage_roi
    metabase_question: 8280
    title: "Meta · Mortgage Brokers — ROI Cohort (Weekly)"
    render: cohort_table
    platform: meta

  # ── Meta KPI slides (Metabase) ────────────────────────────────
  - id: meta_insurance_kpi
    title: "Meta - Insurance Agents Registration"
    render: meta_kpi
    platform: meta
    metabase_question_registrations: 8330
    metabase_question_spend: 8331
    creative_file: "insurance.jpg"   # filename inside roomvu-weekly-report/assets/creatives/

  - id: meta_financial_kpi
    title: "Meta - Financial Planners Registration"
    render: meta_kpi
    platform: meta
    metabase_question_registrations: 8337
    metabase_question_spend: 8336
    creative_file: "financial.jpg"

  - id: meta_realtors_kpi
    title: "Meta - Realtors Registration"
    render: meta_kpi
    platform: meta
    metabase_question_registrations: 8334
    metabase_question_spend: 8335
    creative_file: ""

  - id: meta_mortgage_kpi
    title: "Meta - Mortgage Brokers Registration"
    render: meta_kpi
    platform: meta
    metabase_question_registrations: 8332
    metabase_question_spend: 8333
    creative_file: "mortgage.jpg"

  # ── Meta line chart slides (Metabase) ─────────────────────────
  - id: meta_realestate_spend
    title: "Meta - Real Estate & MB Spend"
    render: line_chart
    platform: meta
    charts:
      - label: "Weekly Spend"
        source: metabase
        metabase_question: 8338
        x_field: week
        y_field: amount_spent
        format: currency
        color: "#6B7FD4"

  - id: meta_realestate_sub_rate
    title: "Meta - Real Estate & MB Subscription Rate"
    render: line_chart
    platform: meta
    charts:
      - label: "Subscription Rate"
        source: metabase
        metabase_question: 8340
        x_field: week
        y_field: subscription_rate_pct
        format: percent
        color: "#6B7FD4"

  - id: meta_total_return_rate
    title: "Meta - Total Return Rate (MB + Realtor)"
    render: line_chart
    platform: meta
    charts:
      - label: "Total Return Rate"
        source: metabase_ratio
        metabase_question_numerator: 8341
        metabase_question_denominator: 8342
        join_field: week_idx
        x_field: week
        numerator_field: total_revenue
        denominator_field: spend
        format: percent
        color: "#4A90D9"

  - id: meta_realestate_cpa
    title: "Meta - Real Estate Acquisition CPA"
    render: line_chart
    platform: meta
    charts:
      - label: "CPA"
        source: metabase
        metabase_question: 8343
        x_field: week
        y_field: cpa
        format: currency
        color: "#E8A020"

  - id: meta_insurance_spend
    title: "Meta - Insurance Agents Spend"
    render: line_chart
    platform: meta
    charts:
      - label: "Weekly Spend"
        source: metabase
        metabase_question: 8344
        x_field: week
        y_field: amount_spent
        format: currency
        color: "#6B7FD4"

  - id: meta_insurance_cpa_register
    title: "Meta - Insurance Agents CPA & Register Weekly"
    render: dual_line_chart
    platform: meta
    charts:
      - label: "Registrations"
        source: metabase
        metabase_question: 8345
        x_field: week
        y_field: Register
        format: number
        color: "#E8956D"
      - label: "CPA"
        source: metabase
        metabase_question: 8345
        x_field: week
        y_field: CPA
        format: currency
        color: "#E8C84A"

  # ── Region targeting table (Metabase, parameterised) ──────────
  - id: meta_realtors_regions
    title: "Meta - Regions based targeting"
    render: region_table
    platform: meta
    metabase_question_spend: 8346
    metabase_question_reg: 8347
    tot_subs_database_id: 74   # roomvu_ads_metrics — all-time active subs per region

  # ── Google Ads slides (Supermetrics + Metabase) ────────────────
  # Matches the marketing team's "New Ads Report Structure - Data Feed" sheet:
  #   Total Return Rate = revenue received that week / acquisition spend
  #   Imm Revenue Rate  = same-week-registration revenue / total spend
  # Acquisition = PPC Social Media + PPC Video + Competitors family
  # (excludes Brand, Demand Gen, Display/Remarketing, Bumper, YT Views).
  - id: google_all_campaigns
    title: "Google - All campaigns"
    render: dual_line_chart
    platform_icon: google
    charts:
      - label: "Total Return Rate"
        source: google_ads_ratio
        database_id: 74
        numerator_sql: google_total_revenue
        numerator_field: total_revenue
        x_field: week
        format: percent
        color: "#4A90D9"
        last_weeks: 46
        spend_basis: acquisition
        acquisition_campaign_ids:
          - "16587957261"   # RV - Registration - PPC Social Media
          - "17809534029"   # RV - Registration - PPC Video
          - "17948075953"   # RV - Registration - Competitors
          - "22265795515"   # RV - Registration - Competitors [IDX]
          - "22440586485"   # RV - Registration - Competitors [Real Geeks]
          - "23737726709"   # RV - Registration - Competitors [Insurance Agent]
          - "23735196152"   # RV - Registration - Competitors [Financial Advisor]
      - label: "Immediate Revenue Rate"
        source: google_ads_ratio
        database_id: 74
        numerator_sql: google_imm_revenue
        numerator_field: imm_revenue
        x_field: week
        format: percent
        color: "#E8956D"
        last_weeks: 46
        spend_basis: total

fixed_columns: [week_idx, week, Registration, Amount_Spent]
