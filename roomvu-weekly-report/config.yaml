# ai_analysis is a FUTURE slide property — not implemented in v1.
metabase_url_env: METABASE_URL
metabase_api_key_env: METABASE_API_KEY
supermetrics_api_key_env: SUPERMETRICS_API_KEY
google_ads_account_id: "459-407-5026"
linkedin_ads_account_id: "508540143"

deck:
  title: "Roomvu — Weekly ROI Cohort Report"
  shade_scale: [0, 150]        # % clamp range for cell color
  break_even: 100              # % anchor for red/green split

slides:
  - id: insurance_roi
    metabase_question: 8268
    title: "Meta · Insurance Agents — ROI Cohort (Weekly)"
    render: cohort_table
    platform: meta
  - id: financial_planners_roi
    metabase_question: 8271
    title: "Meta · Financial Planners — ROI Cohort (Weekly)"
    render: cohort_table
    platform: meta
  - id: realtors_roi
    metabase_question: 8279
    title: "Meta · Realtors — ROI Cohort (Weekly)"
    render: cohort_table
    platform: meta
  - id: mortgage_roi
    metabase_question: 8280
    title: "Meta · Mortgage Brokers — ROI Cohort (Weekly)"
    render: cohort_table
    platform: meta

  # ── Meta KPI slides (Metabase) ────────────────────────────────
  - id: meta_insurance_kpi
    title: "Meta - Insurance Agents Registration"
    render: meta_kpi
    platform: meta
    metabase_question_registrations: 8330
    metabase_question_spend: 8331
    creative_file: "insurance.jpg"   # filename inside roomvu-weekly-report/assets/creatives/

  - id: meta_financial_kpi
    title: "Meta - Financial Planners Registration"
    render: meta_kpi
    platform: meta
    metabase_question_registrations: 8337
    metabase_question_spend: 8336
    creative_file: "financial.jpg"

  - id: meta_realtors_kpi
    title: "Meta - Realtors Registration"
    render: meta_kpi
    platform: meta
    metabase_question_registrations: 8334
    metabase_question_spend: 8335
    creative_file: ""

  - id: meta_mortgage_kpi
    title: "Meta - Mortgage Brokers Registration"
    render: meta_kpi
    platform: meta
    metabase_question_registrations: 8332
    metabase_question_spend: 8333
    creative_file: "mortgage.jpg"

  # ── Meta line chart slides (Metabase) ─────────────────────────
  - id: meta_realestate_spend
    title: "Meta - Real Estate & MB Spend"
    render: line_chart
    platform: meta
    charts:
      - label: "Weekly Spend"
        source: metabase
        metabase_question: 8338
        x_field: week
        y_field: amount_spent
        format: currency
        color: "#6B7FD4"

  # ── Google Ads slides (Supermetrics) ───────────────────────────
  - id: google_all_campaigns
    title: "Google - All campaigns"
    render: dual_line_chart
    platform_icon: google
    charts:
      - label: "Google Total Spending"
        source: google_ads
        fields: [Yearweekiso, Cost]
        x_field: Yearweekiso
        y_field: Cost
        format: currency
        color: "#4A90D9"
      - label: "Google CPA"
        source: google_ads
        fields: [Yearweekiso, CostPerConversion]
        x_field: Yearweekiso
        y_field: CostPerConversion
        format: currency
        color: "#4A90D9"

fixed_columns: [week_idx, week, Registration, Amount_Spent]
